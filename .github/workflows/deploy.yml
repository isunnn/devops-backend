name: CI/CD - Build, Push to Docker Hub, Deploy to EC2-Back (SSM)

on:
  push:
    branches: ["deploy"]

env:
  IMAGE_VENTAS: nicojimenezo/devops-backend-ventas
  IMAGE_DESPACHO: nicojimenezo/devops-backend-despacho

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ventas image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ventas
          push: true
          tags: |
            ${{ env.IMAGE_VENTAS }}:latest
            ${{ env.IMAGE_VENTAS }}:${{ github.sha }}

      - name: Build and push despacho image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.despacho
          push: true
          tags: |
            ${{ env.IMAGE_DESPACHO }}:latest
            ${{ env.IMAGE_DESPACHO }}:${{ github.sha }}

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy EC2-Back 
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_BACK_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy backend (ventas+despacho) from Docker Hub - GitHub Actions ${GITHUB_SHA}" \
            --parameters commands='[
              "set -e",
              "cd /home/ec2-user/deploy-backend || cd ~/deploy-backend",
              "sudo docker compose pull",
              "sudo docker compose up -d",
              "sudo docker ps --format \"table {{.Names}}\t{{.Image}}\t{{.Ports}}\t{{.Status}}\""
            ]'