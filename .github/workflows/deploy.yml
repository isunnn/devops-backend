#comentario para hacer push (video)
name: Deploy Backend (Ventas + Despacho) a ECS

on:
  push:
    branches: [deploy]

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: despacho-cluster-devops

jobs:

  build-and-deploy-ventas:
    name: Ventas - Build, Push y Deploy
    runs-on: ubuntu-latest
    steps:

      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push imagen Ventas
        id: build-image-ventas
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: despacho-backend-ventas
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.ventas -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Descargar Task Definition actual - Ventas
        run: |
          aws ecs describe-task-definition \
            --task-definition despacho-ventas \
            --query taskDefinition > task-def-ventas.json

      - name: Actualizar imagen en Task Definition - Ventas
        id: render-ventas
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-ventas.json
          container-name: ventas
          image: ${{ steps.build-image-ventas.outputs.image }}

      - name: Deploy a ECS - Ventas
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-ventas.outputs.task-definition }}
          service: despacho-ventas-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  build-and-deploy-despacho:
    name: Despacho - Build, Push y Deploy
    runs-on: ubuntu-latest
    steps:

      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push imagen Despacho
        id: build-image-despacho
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: despacho-backend-despacho
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.despacho -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Descargar Task Definition actual - Despacho
        run: |
          aws ecs describe-task-definition \
            --task-definition despacho-despacho \
            --query taskDefinition > task-def-despacho.json

      - name: Actualizar imagen en Task Definition - Despacho
        id: render-despacho
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-despacho.json
          container-name: despacho
          image: ${{ steps.build-image-despacho.outputs.image }}

      - name: Deploy a ECS - Despacho
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-despacho.outputs.task-definition }}
          service: despacho-despacho-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true